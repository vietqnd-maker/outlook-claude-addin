<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <title>Courriel révisé — A&amp;V</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1A1A1A;
      color: #F0F0F0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      padding: 12px 16px;
      background: #252525;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .logo { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
    .amp { color: #E8A0B4; }
    .title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    #content {
      flex: 1;
      width: 100%;
      padding: 16px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13.5px;
      line-height: 1.7;
      color: #EEE;
      background: #1E1E1E;
      border: none;
      outline: none;
      overflow-y: auto;
      cursor: text;
      word-break: break-word;
    }
    #content p  { margin: 0 0 12px 0; }
    #content ul { margin: 0 0 12px 0; padding-left: 20px; }
    #content ol { margin: 0 0 12px 0; padding-left: 20px; }
    #content li { margin-bottom: 4px; }
    .actions {
      padding: 10px 16px;
      background: #252525;
      border-top: 1px solid #333;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .btn-cancel { background: #333; color: #AAA; }
    .btn-cancel:hover { background: #3A3A3A; }
    .btn-apply { background: #E8A0B4; color: #1A1A1A; }
    .btn-apply:hover { background: #F0B8C8; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">A<span class="amp">&</span>V</span>
    <span class="title">Courriel révisé — édition plein écran</span>
  </div>
  <div id="content" contenteditable="true" spellcheck="true" lang="fr"></div>
  <div class="actions">
    <button class="btn btn-cancel" id="btnClose">Annuler</button>
    <button class="btn btn-apply" id="btnApply">✓ Appliquer dans Outlook</button>
  </div>
  <script src="dialog.js"></script>
</body>
</html>
