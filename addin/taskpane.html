<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Réviser avec A&V</title>
  <link rel="stylesheet" href="taskpane.css">
  <!-- Office.js — requis pour interagir avec Outlook -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
</head>
<body>
  <div class="container">

    <!-- En-tête -->
    <header class="header">
      <div class="logo">A<span class="amp">&</span>V</div>
      <div class="subtitle">Révision de courriel</div>
      <div class="email-subject" id="emailSubject" style="display:none"></div>
    </header>

    <!-- État de chargement -->
    <div class="loading" id="loading" style="display:none">
      <div class="spinner"></div>
      <span>Claude analyse le courriel…</span>
    </div>

    <!-- Zone de résultats -->
    <div class="result-container" id="resultContainer" style="display:none">

      <!-- Courriel révisé — en évidence -->
      <div class="section section-primary" id="sectionRevision">
        <div class="section-title section-title-primary">
          <span>✦ Courriel révisé</span>
          <div style="display:flex; gap:6px; align-items:center;">
            <button class="btn-fullscreen" id="btnDebug" title="Debug signature" style="font-size:10px; width:auto; padding:0 6px;">🔍</button>
            <button class="btn-fullscreen" id="btnFullscreen" title="Ouvrir en plein écran">⤢</button>
          </div>
        </div>
        <textarea class="email-revised-edit" id="emailRevised" placeholder="Le courriel révisé apparaîtra ici…" spellcheck="true" lang="fr"></textarea>
        <div class="apply-bar">
          <button class="btn-apply" id="btnApply">✓ Appliquer</button>
        </div>
      </div>

      <!-- Changements clés — replié par défaut -->
      <div class="section" id="sectionChangements">
        <div class="section-title section-toggle" id="toggleChangements">
          <span>Changements clés</span>
          <span class="toggle-arrow">▸</span>
        </div>
        <div class="section-body changes-body" id="changements" style="display:none"></div>
      </div>

      <!-- Diagnostic — réduit par défaut, en bas -->
      <div class="section" id="sectionDiagnostic">
        <div class="section-title section-toggle" id="toggleDiagnostic">
          <span>Diagnostic</span>
          <span class="toggle-arrow">▸</span>
        </div>
        <div class="section-body" id="diagnostic" style="display:none"></div>
      </div>

    </div>

    <!-- Debug temporaire — signature HTML -->
    <div id="debugBox" style="display:none; background:#1a1a2e; border:1px solid #444; border-radius:6px; padding:10px; margin-top:8px;">
      <div style="font-size:10px; color:#888; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;">Debug — HTML brut (signature)</div>
      <textarea id="debugOutput" style="width:100%; height:120px; background:#111; color:#0f0; font-family:monospace; font-size:10px; border:none; outline:none; resize:vertical;"></textarea>
      <button onclick="document.getElementById('debugBox').style.display='none'" style="margin-top:6px; font-size:10px; background:#333; color:#aaa; border:none; padding:3px 8px; border-radius:3px; cursor:pointer;">Fermer</button>
    </div>

    <!-- Message d'erreur -->
    <div class="error-box" id="errorBox" style="display:none">
      <span id="errorMessage"></span>
    </div>

  </div>

  <script src="taskpane.js"></script>
</body>
</html>
